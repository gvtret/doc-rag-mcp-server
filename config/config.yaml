pipeline_version: "1.0.0"

paths:
  sources_incoming: "sources/incoming"
  sources_archived: "sources/archived"
  docs_md_dir: "build/docs_md"
  tables_json_dir: "build/tables_json"
  chunks_dir: "build/chunks_jsonl"
  embeddings_dir: "build/embeddings"
  index_dir: "build/index"
  manifest_path: "build/manifest.json"

parsing:
  # С v2.0 единственный backend для PDF — Docling. Ключ оставлен для
  # совместимости со старыми конфигами; допустимые значения "docling" / "auto".
  pdf_backend: "docling"
  # Backend для DOCX. python-docx — быстрый (по умолчанию), docling —
  # структурный, дороже по времени и памяти.
  docx_backend: "python-docx"
  normalize_whitespace: true
  # Порог «почти пустой страницы» для метрик покрытия (извлечённый текст).
  min_chars_per_page: 20
  # Год редакции в manifest: ручные карты и эвристика по имени файла.
  # До v2.0 автоматически читалось из PDF-метадаты (PyMuPDF/PyPDF2);
  # после удаления этих зависимостей нужно либо указать год явно через
  # by_basename / by_source_rel_path / by_sha256, либо настроить
  # filename_regex.
  edition_year:
    filename_regex: null
    by_basename: {}
    by_source_rel_path: {}
    by_sha256: {}

sectioning:
  enable_numbered_headings: true
  enable_allcaps_headings: true
  min_heading_len: 4
  max_heading_len: 120

chunking:
  strategy: "fixed"
  target_tokens: 512
  overlap_tokens: 64
  # Нечёткая дедупликация чанков между документами (word-bigram Jaccard).
  # 0 = отключено; 0.85 = убирать чанки с ≥85% совпадением из разных документов.
  # PDF имеет приоритет над DOCX: при совпадении сохраняется PDF-чанк.
  dedup_similarity_threshold: 0.85

embeddings:
  model_name: "BAAI/bge-large-en-v1.5"
  device: "cpu"
  batch_size: 32
  normalize: true

index:
  backend: "faiss"
  metric: "ip"
  top_k: 6

server:
  host: "127.0.0.1"
  port: 3333
