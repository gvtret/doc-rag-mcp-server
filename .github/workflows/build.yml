name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free runner disk space
        # Docling pulls ~5 GB of transitive deps (torch, transformers,
        # ONNX runtimes, RapidOCR). Without this step the standard
        # GitHub-hosted runner runs out of disk when exporting the
        # built image. Removes preinstalled toolchains we don't need
        # (Android SDK, .NET, Haskell, large container caches).
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: doc-rag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
