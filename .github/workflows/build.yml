name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare buildx cache dir
        # buildx with `cache-to: type=local` writes layers to a directory
        # on the runner host. The runner-owned `_cache` tree persists
        # across jobs and survives runner upgrades.
        run: mkdir -p /opt/github-runner/_cache/buildx

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: doc-rag:ci
          # Local on-disk buildx cache. On a self-hosted runner this
          # avoids round-tripping through GitHub's Azure-backed cache
          # service (10 GB per-repo quota, occasional 503s) and gives
          # near-instant cache hits when pyproject + uv.lock + the
          # Dockerfile have not changed since the previous run.
          # `mode=max` exports all intermediate layers so subsequent
          # incremental builds resolve from cache rather than rebuild.
          cache-from: type=local,src=/opt/github-runner/_cache/buildx
          cache-to: type=local,dest=/opt/github-runner/_cache/buildx,mode=max
