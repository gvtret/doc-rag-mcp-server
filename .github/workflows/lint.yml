name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python 3.12
        run: uv python pin 3.12

      - name: ruff check
        run: uvx ruff check .

      - name: ruff format --check
        run: uvx ruff format --check .
