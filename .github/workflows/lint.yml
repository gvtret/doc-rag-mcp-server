name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-local-path: /opt/github-runner/_cache/uv

      - name: Pin Python 3.12
        run: uv python pin 3.12

      - name: ruff check
        run: uvx ruff check .

      - name: ruff format --check
        run: uvx ruff format --check .

  svelte-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        working-directory: ui
        run: npm ci --no-audit --no-fund

      - name: svelte-check
        working-directory: ui
        run: npm run check
