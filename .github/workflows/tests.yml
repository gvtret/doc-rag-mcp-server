name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pytest:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends antiword

      - name: Install project (locked)
        run: uv sync --frozen --extra server --extra faiss --extra embeddings --extra dev --extra metrics

      - name: Run tests
        env:
          PYTHONHASHSEED: "0"
        run: |
          uv run --no-sync pytest -q \
            --cov=doc_rag \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=40

      - name: Upload coverage artefact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
