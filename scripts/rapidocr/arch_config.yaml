# ── Recognition models (mobile) ───────────────────────────────────

ch_PP-OCRv4_rec_mobile:
  model_type: rec
  in_channels: 3
  Backbone:
    name: MobileNetV3
    model_name: small
    scale: 0.8
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 48
  Head:
    name: CTCHead
    fc_decay: 0.00001

ch_PP-OCRv4_rec_server:
  model_type: rec
  in_channels: 3
  Backbone:
