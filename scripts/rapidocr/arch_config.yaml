# PP-OCRv4 / v5 architecture configs for rapidocr torch backend.
# Maps model file stem to {Backbone, Neck, Head} config.

# ── Detection models ──────────────────────────────────────────────

ch_PP-OCRv4_det_mobile:
  model_type: det
  in_channels: 3
  Backbone:
    name: MobileNetV3
    model_name: large
    scale: 1.0
  Neck:
    name: DBFPN
    model_name: large
    use_depthwise: true
  Head:
    name: DBHead
    k: 50

ch_PP-OCRv4_det_server:
  model_type: det
  in_channels: 3
  Backbone:
    name: MobileNetV3
    model_name: large
    scale: 1.0
  Neck:
    name: DBFPN
    model_name: large
    use_depthwise: false
  Head:
    name: PFHeadLocal
    k: 50

